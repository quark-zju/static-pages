<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目导航</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap");

    :root {
      --gh-bg: #f6f8fa;
      --gh-surface: #ffffff;
      --gh-border: #d0d7de;
      --gh-text: #24292f;
      --gh-muted: #57606a;
      --gh-blue: #0969da;
      --gh-blue-hover: #0860ca;
      --gh-green: #2da44e;
      --gh-shadow: 0 10px 30px rgba(31, 35, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
      color: var(--gh-text);
      background:
        radial-gradient(circle at 0% 0%, rgba(9, 105, 218, 0.08) 0%, rgba(9, 105, 218, 0) 45%),
        radial-gradient(circle at 100% 100%, rgba(45, 164, 78, 0.08) 0%, rgba(45, 164, 78, 0) 40%),
        var(--gh-bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: min(920px, 100%);
      background: var(--gh-surface);
      border: 1px solid var(--gh-border);
      border-radius: 14px;
      box-shadow: var(--gh-shadow);
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--gh-border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(31, 35, 40, 0.2);
      background: #f0f3f6;
    }

    .content {
      padding: 48px 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.02em;
      line-height: 1.2;
      text-align: center;
    }

    p {
      margin: 16px auto 0;
      max-width: 640px;
      color: var(--gh-muted);
      font-size: 17px;
      line-height: 1.7;
      text-align: center;
    }

    .project-list {
      margin: 34px auto 0;
      max-width: 760px;
      display: grid;
      gap: 12px;
    }

    .project-item {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--gh-border);
      border-radius: 10px;
      background: #fff;
      text-decoration: none;
      color: inherit;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }

    .project-item:hover {
      border-color: #8fb8e8;
      box-shadow: 0 10px 18px rgba(31, 35, 40, 0.08);
      transform: translateY(-1px);
    }

    .project-title {
      color: var(--gh-blue);
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    .project-desc {
      margin-top: 8px;
      color: var(--gh-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .project-path {
      margin-top: 10px;
      display: inline-block;
      font-size: 12px;
      color: #656d76;
      background: #f6f8fa;
      border: 1px solid var(--gh-border);
      border-radius: 999px;
      padding: 2px 8px;
    }

    @media (max-width: 640px) {
      .content {
        padding: 38px 20px;
      }

      p {
        font-size: 16px;
      }

      .content {
        padding: 36px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar" aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </header>

    <section class="content">
      <h1>项目导航</h1>
      <p>
        这里收录当前站点里的子项目入口。点击卡片即可进入对应页面。
      </p>

      <div class="project-list">
        <a class="project-item" href="./model-price-table/">
          <h2 class="project-title">Model Price Table</h2>
          <div class="project-desc">多模型价格对比表，支持按照 Usage Assumption 实时估算输入、缓存读写和输出成本。</div>
          <span class="project-path">/model-price-table/</span>
        </a>
      </div>

    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Pages 风格示例</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap");

    :root {
      --gh-bg: #f6f8fa;
      --gh-surface: #ffffff;
      --gh-border: #d0d7de;
      --gh-text: #24292f;
      --gh-muted: #57606a;
      --gh-blue: #0969da;
      --gh-blue-hover: #0860ca;
      --gh-green: #2da44e;
      --gh-shadow: 0 10px 30px rgba(31, 35, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
      color: var(--gh-text);
      background:
        radial-gradient(circle at 0% 0%, rgba(9, 105, 218, 0.08) 0%, rgba(9, 105, 218, 0) 45%),
        radial-gradient(circle at 100% 100%, rgba(45, 164, 78, 0.08) 0%, rgba(45, 164, 78, 0) 40%),
        var(--gh-bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: min(920px, 100%);
      background: var(--gh-surface);
      border: 1px solid var(--gh-border);
      border-radius: 14px;
      box-shadow: var(--gh-shadow);
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--gh-border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(31, 35, 40, 0.2);
      background: #f0f3f6;
    }

    .content {
      padding: 56px 32px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    p {
      margin: 18px auto 0;
      max-width: 640px;
      color: var(--gh-muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-weight: 600;
      text-decoration: none;
      transition: transform 120ms ease, background-color 120ms ease, border-color 120ms ease;
    }

    .btn-primary {
      background: var(--gh-blue);
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-primary:hover {
      background: var(--gh-blue-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f6f8fa;
      border-color: var(--gh-border);
      color: var(--gh-text);
    }

    .btn-secondary:hover {
      background: #eef2f6;
      transform: translateY(-1px);
    }

    .status {
      margin-top: 30px;
      color: var(--gh-muted);
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .status::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--gh-green);
      box-shadow: 0 0 0 4px rgba(45, 164, 78, 0.15);
    }

    @media (max-width: 640px) {
      .content {
        padding: 38px 20px;
      }

      p {
        font-size: 16px;
      }

      .btn {
        width: 100%;
      }

      .actions {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar" aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </header>

    <section class="content">
      <h1>欢迎来到你的 GitHub Pages</h1>
      <p>
        这是一个简洁的首页模板，采用接近 GitHub Pages 的浅色调、边框层次和按钮风格，
        你可以在此基础上继续扩展项目文档、演示入口或个人站点内容。
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="#">查看项目</a>
        <a class="btn btn-secondary" href="#">阅读文档</a>
      </div>

      <div class="status">页面已部署并运行中</div>
    </section>
  </main>
</body>
</html>
